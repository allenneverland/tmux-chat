name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-x86_64-musl
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }} -p tmux-chatd -p host-agent

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf tmux-chatd-${{ matrix.name }}.tar.gz tmux-chatd
          tar czvf host-agent-${{ matrix.name }}.tar.gz host-agent
          mv tmux-chatd-${{ matrix.name }}.tar.gz ../../../
          mv host-agent-${{ matrix.name }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmux-chatd-${{ matrix.name }}
          path: |
            tmux-chatd-${{ matrix.name }}.tar.gz
            host-agent-${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  update-homebrew-tap:
    needs: [build, release]
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Skip when token is missing
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN is not set. Skipping Homebrew tap update."

      - name: Download all artifacts
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release metadata
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          ARM_ARCHIVE="artifacts/tmux-chatd-darwin-aarch64/tmux-chatd-darwin-aarch64.tar.gz"
          INTEL_ARCHIVE="artifacts/tmux-chatd-darwin-x86_64/tmux-chatd-darwin-x86_64.tar.gz"
          ARM_SHA="$(sha256sum "$ARM_ARCHIVE" | awk '{print $1}')"
          INTEL_SHA="$(sha256sum "$INTEL_ARCHIVE" | awk '{print $1}')"

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "arm_sha=$ARM_SHA"
            echo "intel_sha=$INTEL_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: allenneverland/homebrew-tmux-chat
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update Formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          cat > tap/Formula/tmux-chatd.rb <<EOF
          class TmuxChatd < Formula
            desc "Remote control daemon for tmux sessions"
            homepage "https://github.com/allenneverland/tmux-chat"
            version "${{ steps.meta.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/allenneverland/tmux-chat/releases/download/${{ steps.meta.outputs.tag }}/tmux-chatd-darwin-aarch64.tar.gz"
                sha256 "${{ steps.meta.outputs.arm_sha }}"
              else
                url "https://github.com/allenneverland/tmux-chat/releases/download/${{ steps.meta.outputs.tag }}/tmux-chatd-darwin-x86_64.tar.gz"
                sha256 "${{ steps.meta.outputs.intel_sha }}"
              end
            end

            def install
              bin.install "tmux-chatd"
            end

            service do
              run [opt_bin/"tmux-chatd"]
              keep_alive true
              log_path var/"log/tmux-chatd.log"
              error_log_path var/"log/tmux-chatd.error.log"
            end

            test do
              assert_match "tmux-chatd", shell_output("#{bin}/tmux-chatd --help")
            end
          end
          EOF

      - name: Commit and push Formula update
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          cd tap
          if git diff --quiet -- Formula/tmux-chatd.rb; then
            echo "No Homebrew formula changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tmux-chatd.rb
          git commit -m "Update tmux-chatd formula to ${{ steps.meta.outputs.tag }}"
          git push
