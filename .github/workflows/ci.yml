name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  config-guard:
    name: Config Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure host-agent release is pinned
        run: |
          set -euo pipefail
          if grep -n "releases/latest/download/.*host-agent" ios/TmuxChat/Services/HostAgentInstaller.swift; then
            echo "HostAgentInstaller must not use releases/latest for host-agent."
            exit 1
          fi
          grep -n "<key>HostAgentReleaseTag</key>" ios/TmuxChat/Info.plist
          grep -n "<key>HostAgentRequiredStatusSchemaVersion</key>" ios/TmuxChat/Info.plist

          release_tag="$(python3 -c 'import plistlib,sys; info=plistlib.load(open("ios/TmuxChat/Info.plist","rb")); tag=str(info.get("HostAgentReleaseTag","")).strip(); schema=info.get("HostAgentRequiredStatusSchemaVersion"); (not tag or "$(" in tag) and sys.exit("HostAgentReleaseTag must be a concrete version tag (for example v1.0.19)."); (not tag.startswith("v")) and sys.exit(f"HostAgentReleaseTag must start with v (current: {tag})."); (not isinstance(schema,int) or schema<=0) and sys.exit(f"HostAgentRequiredStatusSchemaVersion must be a positive integer (current: {schema!r})."); print(tag)')"
          echo "Validated HostAgentReleaseTag=${release_tag}"

          api_url="https://api.github.com/repos/allenneverland/tmux-chat/releases/tags/${release_tag}"
          release_json="$(curl -fsSL -H "Accept: application/vnd.github+json" "$api_url")"

          required_assets=(
            "host-agent-darwin-aarch64.tar.gz"
            "host-agent-darwin-x86_64.tar.gz"
            "host-agent-linux-x86_64-musl.tar.gz"
            "host-agent-linux-aarch64-gnu.tar.gz"
          )
          missing=0
          for asset in "${required_assets[@]}"; do
            if echo "$release_json" | jq -e --arg asset "$asset" '.assets[]? | select(.name == $asset)' >/dev/null; then
              echo "Verified release asset: $asset"
            else
              echo "::error::Missing required host-agent release asset '$asset' under tag '${release_tag}'."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  rust-core:
    name: Rust Core
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Rust fmt (workspace)
        run: cargo fmt --all -- --check

      - name: Rust build (tmux-chatd + host-agent)
        run: cargo build --all-targets -p tmux-chatd -p host-agent

      - name: Rust test (tmux-chatd + host-agent)
        run: cargo test -p tmux-chatd -p host-agent

  push-server-docker:
    name: Push Server (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build push-server dev image
        run: docker build -f push-server/Dockerfile --target dev -t tmux-chat-push-server-dev:ci .

      - name: Tests in Docker (push-server)
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            tmux-chat-push-server-dev:ci \
            cargo test -p push-server

      - name: Build runtime image
        run: docker build -f push-server/Dockerfile --target runtime -t tmux-chat-push-server:ci .

      - name: Run container smoke test
        run: |
          docker run -d --rm --name push-server-ci \
            -p 127.0.0.1:8790:8790 \
            -e PUSH_SERVER_BIND_ADDR=0.0.0.0 \
            -e PUSH_SERVER_PORT=8790 \
            tmux-chat-push-server:ci
          trap "docker stop push-server-ci" EXIT
          healthy=0
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:8790/healthz >/dev/null; then
              healthy=1
              break
            fi
            sleep 1
          done
          if [ "$healthy" -ne 1 ]; then
            echo "push-server health check failed"
            docker ps -a --filter "name=^/push-server-ci$" || true
            docker logs push-server-ci || true
            exit 1
          fi

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set iOS CI paths
        run: |
          {
            echo "DERIVED_DATA_PATH=$RUNNER_TEMP/DerivedData"
            echo "SOURCE_PACKAGES_PATH=$RUNNER_TEMP/SourcePackages"
            echo "XCODEBUILD_LOG_PATH=$RUNNER_TEMP/xcodebuild.log"
            echo "XCRESULT_PATH=$RUNNER_TEMP/TmuxChat.xcresult"
            echo "XCRESULT_SUMMARY_PATH=$RUNNER_TEMP/xcresult-summary.json"
          } >> "$GITHUB_ENV"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Show Xcode and SDK info
        run: |
          set -euo pipefail
          xcode_version="$(xcodebuild -version | awk 'NR==1 {print $2}')"
          echo "Xcode version: ${xcode_version}"
          xcodebuild -version
          sdk_list="$(xcodebuild -showsdks)"
          echo "$sdk_list"
          case "$xcode_version" in
            26.*) ;;
            *)
              echo "::error::Expected Xcode 26.x in CI, found ${xcode_version}."
              exit 1
              ;;
          esac
          if ! echo "$sdk_list" | grep -q "iphoneos26"; then
            echo "::error::Expected iPhoneOS 26 SDK in CI output."
            exit 1
          fi

      - name: Prepare Config.xcconfig
        run: |
          if [ ! -f ios/TmuxChat/Config.xcconfig ]; then
            printf '%s\n' \
              '// CI placeholder config' \
              'PUSH_SERVER_BASE_URL = http://127.0.0.1:8790' \
              > ios/TmuxChat/Config.xcconfig
          fi

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          mkdir -p "$SOURCE_PACKAGES_PATH"
          xcodebuild \
            -project ios/TmuxChat.xcodeproj \
            -scheme TmuxChat \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH"

      - name: Build iOS app
        run: |
          set -euo pipefail
          rm -rf "$XCRESULT_PATH"
          xcodebuild \
            -project ios/TmuxChat.xcodeproj \
            -scheme TmuxChat \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
            -disableAutomaticPackageResolution \
            -resultBundlePath "$XCRESULT_PATH" \
            -jobs 2 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build | tee "$XCODEBUILD_LOG_PATH"

      - name: Extract first iOS build error
        if: failure()
        run: |
          set -euo pipefail
          if [ -f "$XCODEBUILD_LOG_PATH" ]; then
            echo "=== First error context from xcodebuild log ==="
            awk '
              BEGIN { found = 0; start = 0; stop = 0 }
              {
                lines[NR] = $0
                if (found == 0 && ($0 ~ /(^|[^A-Za-z])error:/ || $0 ~ /fatal error:/ || $0 ~ /Command SwiftCompile failed/ || $0 ~ /Command CompileSwift failed/)) {
                  found = 1
                  start = NR - 10
                  if (start < 1) start = 1
                  stop = NR + 30
                }
              }
              END {
                if (found == 1) {
                  for (i = start; i <= stop && i <= NR; i++) print lines[i]
                } else {
                  print "No explicit error line found in xcodebuild.log."
                  if (NR > 200) {
                    for (i = NR - 199; i <= NR; i++) print lines[i]
                  } else {
                    for (i = 1; i <= NR; i++) print lines[i]
                  }
                }
              }
            ' "$XCODEBUILD_LOG_PATH"
          else
            echo "xcodebuild log not found: $XCODEBUILD_LOG_PATH"
          fi

      - name: Extract xcresult summary
        if: failure()
        run: |
          set -euo pipefail
          if [ -d "$XCRESULT_PATH" ]; then
            xcrun xcresulttool get --legacy --format json --path "$XCRESULT_PATH" > "$XCRESULT_SUMMARY_PATH" || true
          fi

      - name: Extract first xcresult issue
        if: failure()
        run: |
          set -euo pipefail
          if [ ! -f "$XCRESULT_SUMMARY_PATH" ]; then
            echo "xcresult summary not found: $XCRESULT_SUMMARY_PATH"
            exit 0
          fi
          first_issue="$(
            jq -r '
              ([
                .. | objects
                | {
                    type: (.issueType // .issueType._value // ._type._name // ""),
                    message: (.message // .message._value // ""),
                    location: (
                      .documentLocationInCreatingWorkspace.url
                      // .documentLocationInCreatingWorkspace.url._value
                      // ""
                    )
                  }
                | select((.message | type) == "string" and (.message | length) > 0)
              ][0] // null) as $issue
              | if $issue == null then
                  empty
                else
                  "type=\($issue.type)\nmessage=\($issue.message)\nlocation=\($issue.location)"
                end
            ' "$XCRESULT_SUMMARY_PATH" 2>/dev/null || true
          )"
          if [ -n "$first_issue" ]; then
            echo "=== First issue from xcresult ==="
            printf '%s\n' "$first_issue"
          else
            echo "No parseable issue found in xcresult summary."
          fi

      - name: Upload iOS build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-diagnostics
          if-no-files-found: warn
          path: |
            ${{ env.XCODEBUILD_LOG_PATH }}
            ${{ env.XCRESULT_PATH }}
            ${{ env.XCRESULT_SUMMARY_PATH }}
