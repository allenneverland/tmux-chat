name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  config-guard:
    name: Config Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure host-agent release is pinned
        run: |
          if grep -n "releases/latest/download/.*host-agent" ios/TmuxChat/Services/HostAgentInstaller.swift; then
            echo "HostAgentInstaller must not use releases/latest for host-agent."
            exit 1
          fi
          grep -n "<key>HostAgentReleaseTag</key>" ios/TmuxChat/Info.plist
          grep -n "<key>HostAgentRequiredStatusSchemaVersion</key>" ios/TmuxChat/Info.plist

  rust-core:
    name: Rust Core
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86.0
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Rust fmt (workspace)
        run: cargo fmt --all -- --check

      - name: Rust build (tmux-chatd + host-agent)
        run: cargo build --all-targets -p tmux-chatd -p host-agent

      - name: Rust test (tmux-chatd + host-agent)
        run: cargo test -p tmux-chatd -p host-agent

  push-server-docker:
    name: Push Server (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build push-server dev image
        run: docker build -f push-server/Dockerfile --target dev -t tmux-chat-push-server-dev:ci .

      - name: Tests in Docker (push-server)
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            tmux-chat-push-server-dev:ci \
            cargo test -p push-server

      - name: Build runtime image
        run: docker build -f push-server/Dockerfile --target runtime -t tmux-chat-push-server:ci .

      - name: Run container smoke test
        run: |
          docker run -d --rm --name push-server-ci -p 127.0.0.1:8790:8790 tmux-chat-push-server:ci
          trap "docker stop push-server-ci" EXIT
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:8790/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "push-server health check failed"
          exit 1

  ios-build:
    name: iOS Build
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set iOS CI paths
        run: |
          {
            echo "DERIVED_DATA_PATH=$RUNNER_TEMP/DerivedData"
            echo "SOURCE_PACKAGES_PATH=$RUNNER_TEMP/SourcePackages"
            echo "XCODEBUILD_LOG_PATH=$RUNNER_TEMP/xcodebuild.log"
            echo "XCRESULT_PATH=$RUNNER_TEMP/TmuxChat.xcresult"
            echo "XCRESULT_SUMMARY_PATH=$RUNNER_TEMP/xcresult-summary.json"
          } >> "$GITHUB_ENV"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Show Xcode and SDK info
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks

      - name: Prepare Config.xcconfig
        run: |
          if [ ! -f ios/TmuxChat/Config.xcconfig ]; then
            printf '%s\n' \
              '// CI placeholder config' \
              'PUSH_SERVER_BASE_URL = http://127.0.0.1:8790' \
              > ios/TmuxChat/Config.xcconfig
          fi

      - name: Resolve Swift packages
        run: |
          set -euo pipefail
          mkdir -p "$SOURCE_PACKAGES_PATH"
          xcodebuild \
            -project ios/TmuxChat.xcodeproj \
            -scheme TmuxChat \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH"

      - name: Build iOS app
        run: |
          set -euo pipefail
          rm -rf "$XCRESULT_PATH"
          xcodebuild \
            -project ios/TmuxChat.xcodeproj \
            -scheme TmuxChat \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_PATH" \
            -disableAutomaticPackageResolution \
            -resultBundlePath "$XCRESULT_PATH" \
            -jobs 2 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build | tee "$XCODEBUILD_LOG_PATH"

      - name: Extract first iOS build error
        if: failure()
        run: |
          set -euo pipefail
          if [ -f "$XCODEBUILD_LOG_PATH" ]; then
            echo "=== First error context from xcodebuild log ==="
            awk '
              BEGIN { found = 0; start = 0; stop = 0 }
              {
                lines[NR] = $0
                if (found == 0 && ($0 ~ /(^|[^A-Za-z])error:/ || $0 ~ /fatal error:/ || $0 ~ /Command SwiftCompile failed/ || $0 ~ /Command CompileSwift failed/)) {
                  found = 1
                  start = NR - 10
                  if (start < 1) start = 1
                  stop = NR + 30
                }
              }
              END {
                if (found == 1) {
                  for (i = start; i <= stop && i <= NR; i++) print lines[i]
                } else {
                  print "No explicit error line found in xcodebuild.log."
                  if (NR > 200) {
                    for (i = NR - 199; i <= NR; i++) print lines[i]
                  } else {
                    for (i = 1; i <= NR; i++) print lines[i]
                  }
                }
              }
            ' "$XCODEBUILD_LOG_PATH"
          else
            echo "xcodebuild log not found: $XCODEBUILD_LOG_PATH"
          fi

      - name: Extract xcresult summary
        if: failure()
        run: |
          set -euo pipefail
          if [ -d "$XCRESULT_PATH" ]; then
            xcrun xcresulttool get --legacy --format json --path "$XCRESULT_PATH" > "$XCRESULT_SUMMARY_PATH" || true
          fi

      - name: Upload iOS build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-diagnostics
          if-no-files-found: warn
          path: |
            ${{ env.XCODEBUILD_LOG_PATH }}
            ${{ env.XCRESULT_PATH }}
            ${{ env.XCRESULT_SUMMARY_PATH }}
